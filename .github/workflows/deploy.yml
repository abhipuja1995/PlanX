name: Deploy to EC2 (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Get Runner Public IP
      - name: Get Runner IP
        id: get-ip
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "ip=${RUNNER_IP}" >> $GITHUB_OUTPUT
          echo "GitHub Runner Public IP is $RUNNER_IP"

      # Step 2: Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3: Whitelist Runner IP in Bastion Security Group
      - name: Add Runner IP to Bastion SG
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.BASTION_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get-ip.outputs.ip }}/32

      # Step 4: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: prashanth1003
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 5: Build and Push Docker Image to Docker Hub
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: prashanth1003/planx:latest

      # Step 6: Setup SSH config with ProxyJump
      - name: Configure SSH and Keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BASTION_SSH_KEY }}" > ~/.ssh/bastion_key
          echo "${{ secrets.TARGET_SSH_KEY }}" > ~/.ssh/target_key
          chmod 600 ~/.ssh/bastion_key ~/.ssh/target_key
          
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ${{ secrets.BASTION_USER }}
            IdentityFile ~/.ssh/bastion_key
            StrictHostKeyChecking no

          Host target
            HostName ${{ secrets.TARGET_HOST }}
            User ${{ secrets.TARGET_USER }}
            IdentityFile ~/.ssh/target_key
            StrictHostKeyChecking no
            ProxyJump bastion
          EOF

      # Step 7: Pull image and restart containers on Target EC2 via Bastion ProxyJump
      - name: Restart containers on Target EC2
        run: |
          ssh target << 'EOF'
            # Create target directories on remote target server if they don't exist
            mkdir -p ~/planx
            
            # Log in to Docker Hub on EC2 (required for private repos)
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u prashanth1003 --password-stdin || true
            
            # Pull the new image from Docker Hub
            sudo docker pull prashanth1003/planx:latest
            
            # Stop and remove existing containers if running
            sudo docker stop planx-frontend || true
            sudo docker rm planx-frontend || true
            sudo docker stop planx-backend || true
            sudo docker rm planx-backend || true
            
            # Run the new containers
            ENV_FILE="$HOME/planx/.env"
            
            # 1. Resolve NEXTAUTH_SECRET (from .env, GitHub Secrets, or generated on the fly)
            PERSISTED_SECRET=""
            if [ -f "$ENV_FILE" ]; then
              PERSISTED_SECRET=$(grep -E "^NEXTAUTH_SECRET=" "$ENV_FILE" | cut -d'=' -f2-)
            fi
            
            if [ -z "$PERSISTED_SECRET" ]; then
              if [ -n "${{ secrets.NEXTAUTH_SECRET }}" ]; then
                SH_NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}"
              else
                SH_NEXTAUTH_SECRET=$(openssl rand -base64 32)
                echo "No NEXTAUTH_SECRET found. Generated dynamic secret on the fly."
              fi
            else
              SH_NEXTAUTH_SECRET="$PERSISTED_SECRET"
            fi

            # 2. Run containers with the secret passed in
            if [ -f "$ENV_FILE" ]; then
              sudo docker run -d \
                --name planx-frontend \
                --restart always \
                -p 4200:3000 \
                -e NEXTAUTH_SECRET="$SH_NEXTAUTH_SECRET" \
                --env-file "$ENV_FILE" \
                prashanth1003/planx:latest

              sudo docker run -d \
                --name planx-backend \
                --restart always \
                -p 4211:3000 \
                -e NEXTAUTH_SECRET="$SH_NEXTAUTH_SECRET" \
                --env-file "$ENV_FILE" \
                prashanth1003/planx:latest
            else
              echo "WARNING: .env file not found at $ENV_FILE. Starting containers with dynamic/injected env vars."
              sudo docker run -d \
                --name planx-frontend \
                --restart always \
                -p 4200:3000 \
                -e NEXTAUTH_SECRET="$SH_NEXTAUTH_SECRET" \
                prashanth1003/planx:latest

              sudo docker run -d \
                --name planx-backend \
                --restart always \
                -p 4211:3000 \
                -e NEXTAUTH_SECRET="$SH_NEXTAUTH_SECRET" \
                prashanth1003/planx:latest
            fi
            
            # Clean up dangling images
            sudo docker image prune -f
          EOF

      # Step 8: Clean up / Revoke Runner IP from Bastion SG (Runs ALWAYS)
      - name: Remove Runner IP from Bastion SG
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.BASTION_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get-ip.outputs.ip }}/32
