name: Deploy to EC2 (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Get Runner Public IP
      - name: Get Runner IP
        id: get-ip
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "ip=${RUNNER_IP}" >> $GITHUB_OUTPUT
          echo "GitHub Runner Public IP is $RUNNER_IP"

      # Step 2: Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 3: Whitelist Runner IP in Bastion Security Group
      - name: Add Runner IP to Bastion SG
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.BASTION_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get-ip.outputs.ip }}/32

      # Step 4: Build and Export Docker Image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export image
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: planx:latest
          outputs: type=docker,dest=planx.tar

      - name: Compress image
        run: gzip -f planx.tar

      # Step 5: Setup SSH config with ProxyJump
      - name: Configure SSH and Keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BASTION_SSH_KEY }}" > ~/.ssh/bastion_key
          echo "${{ secrets.TARGET_SSH_KEY }}" > ~/.ssh/target_key
          chmod 600 ~/.ssh/bastion_key ~/.ssh/target_key
          
          cat <<EOF > ~/.ssh/config
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ${{ secrets.BASTION_USER }}
            IdentityFile ~/.ssh/bastion_key
            StrictHostKeyChecking no

          Host target
            HostName ${{ secrets.TARGET_HOST }}
            User ${{ secrets.TARGET_USER }}
            IdentityFile ~/.ssh/target_key
            StrictHostKeyChecking no
            ProxyJump bastion
          EOF

      # Step 6: Transfer Docker Image to Target EC2 via Bastion ProxyJump
      - name: Transfer Docker Image
        run: |
          # Create target directories on remote target server if they don't exist
          ssh target "mkdir -p ~/planx ~/planx-deploy"
          # SCP the image archive directly to the target machine (via Bastion ProxyJump)
          scp planx.tar.gz target:~/planx-deploy/planx.tar.gz

      # Step 7: Load image and restart container on Target EC2
      - name: Load image and restart container
        run: |
          ssh target << 'EOF'
            # Load the new image
            docker load -i ~/planx-deploy/planx.tar.gz
            
            # Clean up the transferred archive
            rm -f ~/planx-deploy/planx.tar.gz
            
            # Stop and remove existing container if running
            docker stop planx || true
            docker rm planx || true
            
            # Run the new container
            ENV_FILE="$HOME/planx/.env"
            if [ -f "$ENV_FILE" ]; then
              docker run -d \
                --name planx \
                --restart always \
                -p 3000:3000 \
                --env-file "$ENV_FILE" \
                planx:latest
            else
              echo "WARNING: .env file not found at $ENV_FILE. Starting container without custom env vars."
              docker run -d \
                --name planx \
                --restart always \
                -p 3000:3000 \
                planx:latest
            fi
            
            # Clean up dangling images
            docker image prune -f
          EOF

      # Step 8: Clean up / Revoke Runner IP from Bastion SG (Runs ALWAYS)
      - name: Remove Runner IP from Bastion SG
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.BASTION_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get-ip.outputs.ip }}/32
